<div class="min-vh-100 d-flex flex-column">
  
  <app-header *ngIf="currentUser && !isDriverApp"></app-header>

  <div class="flex-grow-1 d-flex">
    
    <app-sidebar *ngIf="currentUser && !isDriverApp"></app-sidebar>

    <main class="flex-grow-1 overflow-y-auto" [class.p-4]="!isDriverApp" [ngStyle]="!isDriverApp ? {'max-height': 'calc(100vh - 70px)'} : {}">
      <router-outlet></router-outlet>
    </main>
    
  </div>
</div>

<!-- Global Loading Overlay -->
<div *ngIf="uiService.isLoading$ | async" class="global-loading-overlay">
  <div class="spinner-border text-primary" role="status" style="width: 3rem; height: 3rem;">
    <span class="visually-hidden">Loading...</span>
  </div>
</div>

<!-- Toast Container -->
<div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index: 1055;">
  <div *ngFor="let toast of uiService.toasts$ | async" class="toast show align-items-center text-bg-{{ toast.type }} border-0 mb-2" role="alert" aria-live="assertive" aria-atomic="true">
    <div class="d-flex">
      <div class="toast-body">
        <i class="bi bi-exclamation-circle-fill me-2" *ngIf="toast.type !== 'success'"></i>
        <i class="bi bi-check-circle-fill me-2" *ngIf="toast.type === 'success'"></i>
        {{ toast.message }}
      </div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" (click)="uiService.removeToast(toast.id!)" aria-label="Close"></button>
    </div>
  </div>
</div>
