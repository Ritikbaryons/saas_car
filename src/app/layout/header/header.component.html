  <header *ngIf="currentUser" class="navbar navbar-expand-lg px-4 border-bottom sticky-top glass-card rounded-0" style="border-color: var(--border-color) !important;">
    <div class="container-fluid">
      <a class="navbar-brand d-flex align-items-center gap-2 fw-bold text-dark" href="#" style="color: var(--primary-color) !important;">
        <i class="bi bi-rocket-takeoff text-primary fs-3" style="color: var(--primary-color) !important;"></i>
        <span style="color: var(--text-primary)">FleetFlow <span class="badge bg-primary fs-8 ms-1" style="background-color: var(--primary-color) !important;">SaaS Portal</span></span>
      </a>
      
      <div class="d-flex align-items-center gap-3">
        <div *ngIf="currentUser" class="d-flex align-items-center gap-2 text-secondary">
          <span class="badge bg-secondary px-2.5 py-1 fw-bold text-uppercase" style="background-color: var(--secondary-color) !important;">{{ currentUser.role }}</span>
          <span class="fw-bold" style="color: var(--text-primary);">{{ currentUser.email }}</span>
          <span *ngIf="currentUser.tenantId" class="badge bg-success bg-opacity-25 text-success border border-success">Tenant Active</span>
        </div>
        <button *ngIf="currentUser" (click)="onLogout()" class="btn btn-outline-danger btn-sm px-3 fw-bold">
          <i class="bi bi-box-arrow-right me-1"></i> Sign Out
        </button>
      </div>
    </div>
  </header>
