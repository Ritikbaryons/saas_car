<div class="animate-fade-in">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h2 class="fw-bold m-0" style="color: var(--primary-color)">General Settings</h2>
      <p class="text-secondary m-0">Manage third-party API keys and integration credentials</p>
    </div>
  </div>

  <div class="row g-4 mt-2">
    <!-- Gmail Credentials Box -->
    <div class="col-md-4">
      <div class="glass-card border border-secondary h-100 p-4 shadow-sm hover-shadow transition-all">
        <div class="d-flex align-items-center mb-4 pb-3 border-bottom border-secondary">
          <div class="rounded-circle bg-danger bg-opacity-10 text-danger p-3 me-3 d-flex align-items-center justify-content-center" style="width: 50px; height: 50px;">
            <i class="bi bi-envelope-fill fs-4"></i>
          </div>
          <h4 class="fw-bold mb-0 text-dark">Gmail Settings</h4>
        </div>
        
        <form>
          <div class="mb-3">
            <label class="form-label text-secondary small fw-bold">Email Address <span class="text-danger">*</span></label>
            <input type="email" class="form-control border-secondary" placeholder="e.g. support@yourcompany.com">
          </div>
          <div class="mb-4">
            <label class="form-label text-secondary small fw-bold">App Password / Token <span class="text-danger">*</span></label>
            <input type="password" class="form-control border-secondary" placeholder="Enter App Password">
          </div>
          <button type="button" class="btn btn-outline-danger w-100 py-2 fw-semibold d-flex justify-content-center align-items-center gap-2">
            <i class="bi bi-save"></i> Save Credentials
          </button>
        </form>
      </div>
    </div>

    <!-- Razorpay Box -->
    <div class="col-md-4">
      <div class="glass-card border border-secondary h-100 p-4 shadow-sm hover-shadow transition-all">
        <div class="d-flex align-items-center mb-4 pb-3 border-bottom border-secondary">
          <div class="rounded-circle bg-primary bg-opacity-10 text-primary p-3 me-3 d-flex align-items-center justify-content-center" style="width: 50px; height: 50px;">
            <i class="bi bi-credit-card-2-front-fill fs-4"></i>
          </div>
          <h4 class="fw-bold mb-0 text-dark">Razorpay Setup</h4>
        </div>
        
        <form>
          <div class="mb-3">
            <label class="form-label text-secondary small fw-bold">Key ID <span class="text-danger">*</span></label>
            <input type="text" class="form-control border-secondary" placeholder="rzp_live_...">
          </div>
          <div class="mb-4">
            <label class="form-label text-secondary small fw-bold">Key Secret <span class="text-danger">*</span></label>
            <input type="password" class="form-control border-secondary" placeholder="Enter Razorpay Secret">
          </div>
          <button type="button" class="btn btn-outline-primary w-100 py-2 fw-semibold d-flex justify-content-center align-items-center gap-2">
            <i class="bi bi-save"></i> Save Credentials
          </button>
        </form>
      </div>
    </div>

    <!-- Pinelab Box -->
    <div class="col-md-4">
      <div class="glass-card border border-secondary h-100 p-4 shadow-sm hover-shadow transition-all">
        <div class="d-flex align-items-center mb-4 pb-3 border-bottom border-secondary">
          <div class="rounded-circle bg-success bg-opacity-10 text-success p-3 me-3 d-flex align-items-center justify-content-center" style="width: 50px; height: 50px;">
            <i class="bi bi-terminal-fill fs-4"></i>
          </div>
          <h4 class="fw-bold mb-0 text-dark">Pinelab Setup</h4>
        </div>
        
        <form>
          <div class="mb-3">
            <label class="form-label text-secondary small fw-bold">Merchant ID <span class="text-danger">*</span></label>
            <input type="text" class="form-control border-secondary" placeholder="Enter Merchant ID">
          </div>
          <div class="mb-4">
            <label class="form-label text-secondary small fw-bold">Secret Code <span class="text-danger">*</span></label>
            <input type="password" class="form-control border-secondary" placeholder="Enter Pinelab Secret">
          </div>
          <button type="button" class="btn btn-outline-success w-100 py-2 fw-semibold d-flex justify-content-center align-items-center gap-2">
            <i class="bi bi-save"></i> Save Credentials
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
