<div class="driver-alerts-container position-relative" style="background: #f8fafc; min-height: 100vh; padding-bottom: 80px;">
  <!-- Header -->
  <div class="alerts-header bg-white shadow-sm border-bottom position-sticky top-0 z-3">
    <div class="d-flex justify-content-between align-items-center px-3 py-3">
      <h5 class="mb-0 fw-bold text-dark">Notifications</h5>
      <button class="btn btn-link text-primary text-decoration-none small fw-bold p-0" (click)="markAllAsRead()">
        Mark all read
      </button>
    </div>
  </div>

  <div class="alerts-content p-3">
    
    <div class="alert-item card border-0 shadow-sm rounded-4 mb-3 position-relative overflow-hidden cursor-pointer" 
         *ngFor="let alert of alerts" 
         (click)="markAsRead(alert)"
         [ngClass]="{'bg-white': alert.read, 'unread-alert': !alert.read}">
      
      <!-- Unread indicator -->
      <div *ngIf="!alert.read" class="position-absolute top-0 start-0 h-100" style="width: 4px; background-color: var(--primary-color);"></div>
      
      <div class="card-body p-3 d-flex align-items-start gap-3">
        <div class="icon-circle rounded-circle d-flex align-items-center justify-content-center flex-shrink-0" 
             [ngClass]="'bg-' + alert.color + ' bg-opacity-10 text-' + alert.color" 
             style="width: 48px; height: 48px;">
          <i class="bi {{ alert.icon }} fs-5"></i>
        </div>
        
        <div class="flex-grow-1">
          <div class="d-flex justify-content-between align-items-start mb-1">
            <h6 class="fw-bold text-dark mb-0 fs-6" [ngClass]="{'text-muted fw-medium': alert.read}">{{ alert.title }}</h6>
            <small class="text-muted" style="font-size: 0.7rem;">{{ alert.time | date:'shortTime' }}</small>
          </div>
          <p class="mb-0 small text-secondary" style="line-height: 1.4;">{{ alert.message }}</p>
        </div>
      </div>
    </div>

    <!-- Empty State -->
    <div *ngIf="alerts.length === 0" class="d-flex flex-column justify-content-center align-items-center text-center mt-5 p-4">
      <div class="rounded-circle bg-light d-flex align-items-center justify-content-center mb-3" style="width: 80px; height: 80px;">
        <i class="bi bi-bell-slash text-muted fs-1"></i>
      </div>
      <h5 class="fw-bold text-dark">No Notifications</h5>
      <p class="text-muted small mb-0">You're all caught up! New alerts and updates will appear here.</p>
    </div>

  </div>
</div>

<style>
  .unread-alert {
    background: linear-gradient(to right, rgba(110, 44, 34, 0.03), white);
  }
</style>
