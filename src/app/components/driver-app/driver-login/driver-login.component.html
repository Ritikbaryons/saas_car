<div class="driver-login-container">
  <div class="login-header">
    <div class="logo-container">
      <div class="logo-icon bg-white text-primary">
        <i class="bi bi-truck"></i>
      </div>
      <h2 class="fw-bold mb-0 text-white">Fleet Navigator</h2>
    </div>
    <p class="text-white-50 mt-2 small subtitle">Precision logistics for the modern professional driver.</p>
  </div>

  <div class="login-card">
    <div class="mb-4">
      <h3 class="fw-bold text-dark mb-2">Welcome Back</h3>
      <p class="text-muted small">Access your routes and vehicle dashboard by logging in below.</p>
    </div>

    <div *ngIf="error" class="alert alert-danger p-2 small text-center rounded-3">
      {{ error }}
    </div>

    <form (ngSubmit)="onLogin()">
      <div class="mb-3">
        <label class="form-label small fw-bold text-dark">Mobile Number or Employee ID</label>
        <div class="input-group custom-input-group">
          <span class="input-group-text bg-white border-end-0 text-muted">
            <i class="bi bi-person-badge"></i>
          </span>
          <input type="text" class="form-control border-start-0 ps-0" placeholder="Enter credentials" [(ngModel)]="email" name="email">
        </div>
      </div>

      <div class="mb-3">
        <div class="d-flex justify-content-between align-items-center">
          <label class="form-label small fw-bold text-dark mb-0">Password</label>
          <a href="#" class="small text-primary text-decoration-none fw-bold">Forgot Password?</a>
        </div>
        <div class="input-group custom-input-group mt-2">
          <span class="input-group-text bg-white border-end-0 text-muted">
            <i class="bi bi-lock"></i>
          </span>
          <input type="password" class="form-control border-start-0 border-end-0 ps-0" placeholder="••••••••" [(ngModel)]="password" name="password">
          <span class="input-group-text bg-white border-start-0 text-muted">
            <i class="bi bi-eye"></i>
          </span>
        </div>
      </div>

      <div class="form-check mb-4">
        <input class="form-check-input" type="checkbox" id="rememberMe">
        <label class="form-check-label small text-muted" for="rememberMe">
          Remember this device
        </label>
      </div>

      <button type="submit" class="btn btn-primary w-100 py-3 rounded-3 fw-bold d-flex justify-content-center align-items-center gap-2 shadow-sm" [disabled]="loading">
        <span *ngIf="loading" class="spinner-border spinner-border-sm"></span>
        <span *ngIf="!loading">Login to Dashboard</span>
        <i *ngIf="!loading" class="bi bi-arrow-right"></i>
      </button>
    </form>

    <div class="row mt-4 g-2">
      <div class="col-6">
        <div class="action-card text-center p-3 rounded-3 bg-light cursor-pointer">
          <i class="bi bi-question-circle-fill text-primary mb-1 d-block fs-5"></i>
          <span class="small fw-bold text-dark">Help Center</span>
        </div>
      </div>
      <div class="col-6">
        <div class="action-card text-center p-3 rounded-3 bg-light cursor-pointer">
          <i class="bi bi-globe text-secondary mb-1 d-block fs-5"></i>
          <span class="small fw-bold text-dark">Language</span>
        </div>
      </div>
    </div>
  </div>

  <div class="login-footer text-center mt-auto pb-4">
    <div class="text-muted small d-flex align-items-center justify-content-center gap-1">
      <i class="bi bi-shield-check"></i>
      <span class="fw-bold text-uppercase" style="font-size: 0.7rem; letter-spacing: 0.5px;">Enterprise Secure</span>
    </div>
    <div class="text-muted" style="font-size: 0.7rem;">
      Fleet Navigator v4.2.0 &bull; Build 2024.11
    </div>
  </div>
</div>
