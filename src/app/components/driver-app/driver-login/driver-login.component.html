<div class="driver-login-container">
  <div class="login-card shadow">
    <div class="text-center mb-4">
      <h2 class="fw-bold text-primary">Fleet Driver App</h2>
      <p class="text-muted small">Login to manage your rides & attendance</p>
    </div>

    <div *ngIf="error" class="alert alert-danger p-2 small text-center">
      {{ error }}
    </div>

    <form (ngSubmit)="onLogin()">
      <div class="form-floating mb-3">
        <input type="email" class="form-control" id="email" placeholder="name@example.com" [(ngModel)]="email" name="email">
        <label for="email">Email address / User ID</label>
      </div>
      <div class="form-floating mb-4">
        <input type="password" class="form-control" id="password" placeholder="Password" [(ngModel)]="password" name="password">
        <label for="password">Password</label>
      </div>

      <button type="submit" class="btn btn-primary w-100 btn-lg rounded-pill" [disabled]="loading">
        <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
        Login
      </button>
    </form>
  </div>
</div>
