<div class="driver-app-container">
  <!-- Dynamic Content Area -->
  <div class="driver-content pb-5">
    <router-outlet></router-outlet>
  </div>

  <!-- Bottom Navigation Bar -->
  <nav class="driver-bottom-nav fixed-bottom bg-white d-flex justify-content-around align-items-center px-2 pb-3 pt-2">
    <a routerLink="/driver/home" class="nav-item text-center text-decoration-none" [class.active]="isActive('/driver/home')">
      <div class="icon-wrapper" [class.bg-primary]="isActive('/driver/home')" [class.text-white]="isActive('/driver/home')">
        <i class="bi fs-5" [ngClass]="isActive('/driver/home') ? 'bi-house-fill' : 'bi-house text-secondary'"></i>
      </div>
      <span class="small d-block mt-1" [ngClass]="isActive('/driver/home') ? 'text-primary fw-bold' : 'text-secondary'">Home</span>
    </a>
    <a routerLink="/driver/history" class="nav-item text-center text-decoration-none" [class.active]="isActive('/driver/history')">
      <div class="icon-wrapper" [class.bg-primary]="isActive('/driver/history')" [class.text-white]="isActive('/driver/history')">
        <i class="bi fs-5" [ngClass]="isActive('/driver/history') ? 'bi-sign-turn-right-fill' : 'bi-sign-turn-right text-secondary'"></i>
      </div>
      <span class="small d-block mt-1" [ngClass]="isActive('/driver/history') ? 'text-primary fw-bold' : 'text-secondary'">My Trips</span>
    </a>
    <a routerLink="/driver/attendance" class="nav-item text-center text-decoration-none" [class.active]="isActive('/driver/attendance')">
      <div class="icon-wrapper position-relative" [class.bg-primary]="isActive('/driver/attendance')" [class.text-white]="isActive('/driver/attendance')">
        <i class="bi fs-5" [ngClass]="isActive('/driver/attendance') ? 'bi-calendar-check-fill' : 'bi-calendar-check text-secondary'"></i>
      </div>
      <span class="small d-block mt-1" [ngClass]="isActive('/driver/attendance') ? 'text-primary fw-bold' : 'text-secondary'">Attendance</span>
    </a>
    <a routerLink="/driver/profile" class="nav-item text-center text-decoration-none" [class.active]="isActive('/driver/profile')">
      <div class="icon-wrapper" [class.bg-primary]="isActive('/driver/profile')" [class.text-white]="isActive('/driver/profile')">
        <i class="bi fs-5" [ngClass]="isActive('/driver/profile') ? 'bi-person-fill' : 'bi-person text-secondary'"></i>
      </div>
      <span class="small d-block mt-1" [ngClass]="isActive('/driver/profile') ? 'text-primary fw-bold' : 'text-secondary'">Profile</span>
    </a>
  </nav>
</div>
